trigger:
  branches:
    include:
      - main

pool: autoagent

steps:
- task: TerraformInstaller@1
  inputs:
    terraformVersion: 'latest'
- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'init'
    workingDirectory: '$(System.DefaultWorkingDirectory)/dev'
    backendServiceArm: 'myconnection'
    backendAzureRmResourceGroupName: 'rg-vishnu'
    backendAzureRmStorageAccountName: 'stgvishnu'
    backendAzureRmContainerName: 'contvishnu'
    backendAzureRmKey: 'terraform.tfstate'
- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'plan'
    workingDirectory: '$(System.DefaultWorkingDirectory)/dev'
    environmentServiceNameAzureRM: 'myconnection'
- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'apply'
    workingDirectory: '$(System.DefaultWorkingDirectory)/dev'
    commandOptions: '-auto-approve'
    environmentServiceNameAzureRM: 'myconnection'