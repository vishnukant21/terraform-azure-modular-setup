trigger:
  branches:
    include:
      - main

pool: appagent  # Pool name define

stages:
  - stage: initplan
    displayName: Init & Plan
    jobs:
      - job: initplan
        displayName: Init & Plan

        steps:
        - task: TerraformInstaller@1
          inputs:
            terraformVersion: '1.14.7'
        - task: TerraformTask@5
          displayName: Terraform Init
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: '$(System.DefaultWorkingDirectory)/Environments/dev'
            backendServiceArm: 'myconnection'
            backendAzureRmResourceGroupName: 'gss-rg'
            backendAzureRmStorageAccountName: 'gssstg'
            backendAzureRmContainerName: 'gsscont'
            backendAzureRmKey: 'terraform.tfstate'

        - task: PowerShell@2
          displayName: Infracost 
          inputs:
            targetType: 'inline'
            script: |
              Invoke-WebRequest -Uri "https://github.com/infracost/infracost/releases/latest/download/infracost-windows-amd64.zip" -OutFile "infracost.zip"
              Expand-Archive infracost.zip -DestinationPath "$env:BUILD_SOURCESDIRECTORY\infracost" -Force
              $env:Path += ";$env:BUILD_SOURCESDIRECTORY\infracost"
              infracost breakdown --path="$(System.DefaultWorkingDirectory)/Environments/dev" --format=table


        - task: TerraformTask@5
          displayName: Terraform Plan
          inputs:
            provider: 'azurerm'
            command: 'plan'
            workingDirectory: '$(System.DefaultWorkingDirectory)/Environments/dev'
            environmentServiceNameAzureRM: 'myconnection'
          
  - stage: securityscanning
    displayName: Security Scanning
    jobs:
      - job: securityscanning
        displayName: Security Scanning
        steps:
        - task: tfsec@1
          inputs:
            version: 'v1.26.0'
            dir: '$(System.DefaultWorkingDirectory)/Environments/dev'

        - task: PowerShell@2
          displayName: Stylelint
          inputs:
            targetType: 'inline'
            script: |
              Set-Location $(System.DefaultWorkingDirectory)
              npm install
              npx stylelint "**/*.css" "**/*.scss" --formatter json > stylelint-report.json

        - task: PowerShell@2
          displayName: Tflint linter
          inputs:
            targetType: 'inline'
            script: |
              Invoke-WebRequest https://github.com/terraform-linters/tflint/releases/latest/download/tflint_windows_amd64.zip -OutFile tflint.zip
              Expand-Archive tflint.zip -DestinationPath tflint
              .\tflint\tflint.exe --init
              .\tflint\tflint.exe

        - task: PowerShell@2
          displayName: Biome Lint & Format
          inputs:
            targetType: 'inline'
            script: |
              npm install @biomejs/biome --save-dev
              npx biome check . --write

        - task: PowerShell@2
          displayName: Run Checkov Scan
          continueOnError: true
          inputs:
            targetType: 'inline'
            script: |
              pip install checkov
              checkov -d $(System.DefaultWorkingDirectory) --framework terraform
              

        - task: PowerShell@2
          displayName: Trivy Scan
          inputs:
            targetType: 'inline'
            script: |
              Invoke-WebRequest -Uri "https://github.com/aquasecurity/trivy/releases/download/v0.69.3/trivy_0.69.3_windows-64bit.zip" -OutFile "trivy.zip"
              Expand-Archive trivy.zip -DestinationPath "$(Build.SourcesDirectory)\trivy" -Force
        - task: PowerShell@2
          displayName: Run Trivy
          inputs:
            targetType: 'inline'
            script: '$(Build.SourcesDirectory)\trivy\trivy.exe config $(System.DefaultWorkingDirectory)'
        
  - stage: manualapprover
    displayName: Manual Approver
    jobs:
      - job: manualapprover
        displayName: Manual Approver
        pool: server
        steps:
        - task: ManualValidation@1
          inputs:
            notifyUsers: 'vishnukantmishra21072002@gmail.com'
            approvers: 'vishnukantmishra21072002@gmail.com'

  - stage: initapply
    displayName: Init & Apply
    jobs:
      - job: initandapply
        displayName: Init & Apply
        steps:
        - task: TerraformTask@5
          displayName: Terraform Init
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: '$(System.DefaultWorkingDirectory)/Environments/dev'
            backendServiceArm: 'myconnection'
            backendAzureRmResourceGroupName: 'gss-rg'
            backendAzureRmStorageAccountName: 'gssstg'
            backendAzureRmContainerName: 'gsscont'
            backendAzureRmKey: 'terraform.tfstate'
        
        - task: TerraformTask@5
          displayName: Terraform Apply
          inputs:
            provider: 'azurerm'
            command: 'apply'
            workingDirectory: '$(System.DefaultWorkingDirectory)/Environments/dev'
            commandOptions: '-auto-approve'
            environmentServiceNameAzureRM: 'myconnection'